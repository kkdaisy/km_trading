<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Symbol Overview Widget</title>
    <style>
        /* 노션에서 가득 차게 보이도록 여백 제거 */
        body { margin: 0; padding: 0; overflow: hidden; background-color: transparent; }
    </style>
</head>
<body>
    <!-- TradingView Widget BEGIN -->
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
      <script type="text/javascript">
      new TradingView.MediumWidget(
      {
      "symbols": [
        [
          "Apple",
          "NASDAQ:AAPL|1D"
        ],
        [
          "QQQM",
          "NASDAQ:QQQM|1D"
        ],
        [
          "Nvidia",
          "NASDAQ:NVDA|1D"
        ],
        [
          "Costco",
          "NASDAQ:COST|1D"
        ],
        [
          "Palantir",
          "NYSE:PLTR|1D"
        ],
        [
          "윈스테크넷",
          "KRX:136540|1D"
        ],
        [
          "KODEX 코스닥150",
          "KRX:229200|1D"
        ],
        [
          "대한항공",
          "KRX:003490|1D"
        ]
      ],
      "chartOnly": false,
      "width": "100%",
      "height": 500,
      "locale": "kr",
      "colorTheme": "light",
      "autosize": true,
      "showVolume": false,
      "hideDateRanges": false,
      "hideMarketStatus": false,
      "hideSymbolLogo": false,
      "scalePosition": "right",
      "scaleMode": "Normal",
      "fontFamily": "-apple-system, BlinkMacSystemFont, Trebuchet MS, Roboto, Ubuntu, sans-serif",
      "fontSize": "10",
      "noTimeScale": false,
      "valuesTracking": "1",
      "changeMode": "price-and-percent",
      "chartType": "area",
      "maLineColor": "#2962FF",
      "maLineWidth": 1,
      "maLength": 9,
      "lineWidth": 2,
      "lineType": 0,
      "dateRanges": [
        "1d|1",
        "1m|30",
        "3m|60",
        "12m|1D",
        "60m|1W",
        "all|1M"
      ]
    }
      );
      </script>
    </div>
    <!-- TradingView Widget END -->
</body>
</html>
